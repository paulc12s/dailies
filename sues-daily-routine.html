<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sue's Daily Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2eb; --surface: #fffef9; --border: #ddd8cc; --text: #1a1814; --muted: #7a7367; --accent: #3d5a8a;
    --badge-pt-bg: #e8eef6;      --badge-pt-text: #2a4570;
    --badge-cardio-bg: #fdf3e3;  --badge-cardio-text: #8a5a1a;
    --badge-walk-bg: #eaf6ee;    --badge-walk-text: #2a6040;
    --badge-core-bg: #f6eaf3;    --badge-core-text: #6a2a5a;
    --badge-legs-bg: #f3eeea;    --badge-legs-text: #5a4030;
    --badge-neutral-bg: #f0ede6; --badge-neutral-text: #5a5550;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:1.5rem 0 1.25rem; text-align:center; position:sticky; top:0; z-index:100; }
  header h1 { font-family:'DM Serif Display',serif; font-size:1.6rem; font-weight:400; letter-spacing:-0.02em; }
  header h1 span { font-style:italic; color:var(--accent); }
  .date-bar { font-size:0.72rem; color:var(--muted); margin-top:0.3rem; letter-spacing:0.04em; text-transform:uppercase; }
  .reset-note { font-size:0.66rem; color:var(--muted); margin-top:0.15rem; opacity:0.65; }
  .tabs { display:flex; justify-content:center; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:82px; z-index:99; }
  .tab { padding:0.65rem 1.75rem; font-size:0.75rem; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:color 0.2s,border-color 0.2s; user-select:none; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .panel { display:none; }
  .panel.active { display:block; }
  main { max-width:720px; margin:0 auto; padding:1.75rem 1.5rem 4rem; }
  .cal-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.25rem 1.25rem 1rem; margin-bottom:1.75rem; }
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:0.5rem; }
  .cal-title { font-size:0.7rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }
  .cal-legend { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; }
  .cal-legend-item { display:flex; align-items:center; gap:0.3rem; font-size:0.62rem; color:var(--muted); }
  .cal-dot { width:9px; height:9px; border-radius:50%; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day-label { font-size:0.6rem; text-align:center; color:var(--muted); padding-bottom:3px; letter-spacing:0.04em; }
  .cal-cell { aspect-ratio:1; border-radius:6px; display:flex; align-items:center; justify-content:center; position:relative; }
  .cal-cell.has-data { cursor:pointer; }
  .cal-cell.has-data:hover .cal-tooltip { display:block; }
  .cal-cell-inner { width:100%; height:100%; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:0.6rem; color:var(--muted); border:1px solid var(--border); background:var(--bg); overflow:hidden; }
  .cal-cell.today .cal-cell-inner { border:2px solid var(--accent); }
  .cal-tooltip { display:none; position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:var(--text); color:#fff; font-size:0.63rem; padding:5px 8px; border-radius:5px; white-space:nowrap; z-index:200; pointer-events:none; }
  .cal-tooltip::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:4px solid transparent; border-top-color:var(--text); }
  .progress-bar-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.8rem 1rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:1rem; }
  .progress-label { font-size:0.72rem; color:var(--muted); white-space:nowrap; }
  .progress-track { flex:1; height:5px; background:var(--border); border-radius:10px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:10px; transition:width 0.35s ease; }
  .progress-count { font-size:0.72rem; font-weight:500; color:var(--accent); white-space:nowrap; min-width:36px; text-align:right; }
  .section { margin-bottom:2.25rem; }
  .section-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.75rem; }
  .section-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .section-label { font-size:0.68rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
  .section-line { flex:1; height:1px; background:var(--border); }
  .item { display:flex; align-items:flex-start; gap:0.875rem; padding:0.875rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:0.5rem; cursor:pointer; transition:background 0.15s,border-color 0.15s; user-select:none; }
  .item:hover { border-color:#ccc6b8; }
  .item.done { background:#eef3f9; border-color:#7fa0c8; border-left:3px solid #3d5a8a; }
  .checkbox { width:20px; height:20px; min-width:20px; border-radius:5px; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; margin-top:1px; transition:background 0.15s,border-color 0.15s; flex-shrink:0; }
  .item.done .checkbox { background:var(--accent); border-color:var(--accent); }
  .check-icon { display:none; width:11px; height:11px; }
  .item.done .check-icon { display:block; }
  .item-body { flex:1; min-width:0; }
  .item-top { display:flex; align-items:center; flex-wrap:wrap; gap:0.4rem; margin-bottom:0.3rem; }
  .item-name { font-size:0.95rem; font-weight:500; color:var(--text); transition:color 0.2s; }
  .item.done .item-name { color:var(--accent); }
  .item.done .item-summary, .item.done .item-meta { opacity:0.6; }
  .badge { font-size:0.65rem; font-weight:500; letter-spacing:0.03em; padding:2px 7px; border-radius:20px; white-space:nowrap; }
  .badge-pt      { background:var(--badge-pt-bg);     color:var(--badge-pt-text); }
  .badge-cardio  { background:var(--badge-cardio-bg);  color:var(--badge-cardio-text); }
  .badge-walk    { background:var(--badge-walk-bg);    color:var(--badge-walk-text); }
  .badge-core    { background:var(--badge-core-bg);    color:var(--badge-core-text); }
  .badge-legs    { background:var(--badge-legs-bg);    color:var(--badge-legs-text); }
  .badge-neutral { background:var(--badge-neutral-bg); color:var(--badge-neutral-text); }
  .item-summary { font-size:0.8rem; color:var(--muted); line-height:1.55; transition:opacity 0.2s; }
  .item-meta    { font-size:0.72rem; color:#a09890; margin-top:0.25rem; transition:opacity 0.2s; }
  .reset-btn { display:block; margin:0 auto 2rem; font-family:'DM Sans',sans-serif; font-size:0.7rem; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); background:none; border:1px solid var(--border); border-radius:6px; padding:0.4rem 1rem; cursor:pointer; transition:color 0.15s,border-color 0.15s; }
  .reset-btn:hover { color:var(--text); border-color:#bbb5a8; }
  @media(max-width:480px){
    header{padding:1.1rem 0 0.9rem;} header h1{font-size:1.3rem;} .tabs{top:70px;}
    main{padding:1.25rem 0.875rem 3rem;} .item{padding:0.75rem 0.875rem;} .tab{padding:0.6rem 1.1rem;font-size:0.7rem;}
  }
</style>
</head>
<body>
<header>
  <h1>Sue's Daily <span>Routine</span></h1>
  <div class="date-bar" id="dateBar"></div>
  <div class="reset-note">Checks reset at 4:00 AM · history saved forever</div>
</header>
<div class="tabs">
  <div class="tab active" onclick="switchTab('exercises', this)">Exercises</div>
  <div class="tab" onclick="switchTab('history', this)">History</div>
</div>
<main>
  <div id="exercises" class="panel active"></div>
  <div id="history" class="panel"></div>
</main>
<script>
const ITEMS = {
  exercises: [
    {
      section: "Shoulder PT",
      dot: "#3d5a8a",
      items: [
        {
          id: "shoulder-hang",
          name: "Hang Stretch, Shoulder Rolls & Roller Stretches",
          cat: "pt",
          catLabel: "Shoulder",
          summary: "Passive hang to decompress the joint, shoulder rolls to warm up range of motion, and foam roller work across the upper back and rotator cuff.",
          meta: "Do before any resistance work \u00b7 hold hang 20\u201330 sec"
        },
        {
          id: "shoulder-weights",
          name: "Shoulder Weights",
          cat: "pt",
          catLabel: "Shoulder",
          summary: "Targeted resistance exercises for the rotator cuff and deltoids \u2014 lateral raises, external rotation, and scaption to rebuild shoulder stability and strength.",
          meta: "Light weight, controlled reps \u00b7 prioritize form over load"
        }
      ]
    },
    {
      section: "Upper Body",
      dot: "#5a3d8a",
      items: [
        {
          id: "upper-weights",
          name: "Bicep, Back & Tricep Weights",
          cat: "pt",
          catLabel: "Upper Body",
          summary: "Compound and isolation work for the arms and back \u2014 rows, curls, and tricep extensions to build balanced upper body strength while supporting the shoulder.",
          meta: "Coordinate with shoulder PT days \u00b7 avoid overloading on same days"
        }
      ]
    },
    {
      section: "Core",
      dot: "#8a3d6a",
      items: [
        {
          id: "bird-dog",
          name: "Bird Dog",
          cat: "pt",
          catLabel: "Core",
          summary: "Opposite arm and leg extension from a tabletop position \u2014 builds spinal stability, glute activation, and deep core control without loading the lumbar spine.",
          meta: "3 sets \u00b7 10\u201312 reps per side \u00b7 slow and controlled"
        },
        {
          id: "plank",
          name: "Plank & Plank Variations",
          cat: "pt",
          catLabel: "Core",
          summary: "Standard plank, side planks, and variations like plank shoulder taps or dead bugs \u2014 builds full-core endurance and improves posture and spinal support.",
          meta: "Mix static holds with dynamic variations for best results"
        },
        {
          id: "abs-back",
          name: "Abs & Lower Back",
          cat: "core",
          catLabel: "Core",
          summary: "Targeted work for the rectus abdominis and erector spinae \u2014 crunches, dead bugs, back extensions, or similar to balance anterior and posterior core strength.",
          meta: "Keep lower back work pain-free \u00b7 avoid loaded spinal flexion if sensitive"
        }
      ]
    },
    {
      section: "Lower Body",
      dot: "#7a5a3a",
      items: [
        {
          id: "leg-weights",
          name: "Leg Weights",
          cat: "legs",
          catLabel: "Legs",
          summary: "Squats, lunges, leg press, or step-ups to build lower body strength \u2014 supports joint health, balance, and metabolism.",
          meta: "Include glutes and hamstrings, not just quads"
        }
      ]
    },
    {
      section: "Cardio",
      dot: "#8a5a1a",
      items: [
        {
          id: "elliptical",
          name: "Elliptical",
          cat: "cardio",
          catLabel: "Cardio",
          summary: "Low-impact steady-state cardio that's easy on the joints \u2014 great for building aerobic base without the impact stress of running.",
          meta: "Aim 20\u201345 min \u00b7 moderate resistance for best benefit"
        },
        {
          id: "hills-walking",
          name: "Hills Walking",
          cat: "cardio",
          catLabel: "Cardio",
          summary: "Incline walking outdoors or on treadmill \u2014 combines cardiovascular benefit with glute and lower body activation, higher calorie burn than flat walking.",
          meta: "Adds meaningful resistance without joint stress"
        }
      ]
    },
    {
      section: "Walks",
      dot: "#2a6040",
      items: [
        {
          id: "walk-short",
          name: "Short Walk with Dog",
          cat: "walk",
          catLabel: "Walk",
          summary: "A brief neighborhood walk \u2014 gets you outside, moving, and benefits your pup too. Even 10\u201315 minutes of movement adds up.",
          meta: "Any time of day \u00b7 prioritize consistency over distance"
        },
        {
          id: "walk-long",
          name: "Longer Walk",
          cat: "walk",
          catLabel: "Walk",
          summary: "A more intentional walk \u2014 30+ minutes at a good pace. Great for mental clarity, Zone 2 cardio, and active recovery on lighter days.",
          meta: "Try to include varied terrain or incline for added benefit"
        }
      ]
    },
    {
      section: "Movement & Fun",
      dot: "#6a3a7a",
      items: [
        {
          id: "dance-class",
          name: "Dance Class",
          cat: "cardio",
          catLabel: "Cardio",
          summary: "Full-body movement combining cardio, coordination, and joy \u2014 one of the most sustainable forms of exercise because it doesn't feel like exercise.",
          meta: "Counts as both cardio and social activity \u00b7 a genuine win-win"
        }
      ]
    }
  ]
};

const ALL_IDS = ITEMS.exercises.flatMap(g => g.items.map(i => i.id));
const TOTAL   = ALL_IDS.length;

function readCookie(name){
  const m = document.cookie.match('(?:^|;)\\s*' + name + '=([^;]*)');
  if(!m) return null;
  try { return JSON.parse(decodeURIComponent(m[1])); } catch(e) { return null; }
}
function writeCookie(name, value, expires){
  let s = name + '=' + encodeURIComponent(JSON.stringify(value)) + ';path=/';
  if(expires) s += ';expires=' + expires.toUTCString();
  document.cookie = s;
}
function logicalBase(){
  const now = new Date(), base = new Date(now);
  if(now.getHours() < 4) base.setDate(base.getDate() - 1);
  return base;
}
function logicalToday(){
  const b = logicalBase();
  return b.getFullYear() + '-' + String(b.getMonth()+1).padStart(2,'0') + '-' + String(b.getDate()).padStart(2,'0');
}
function dailyKey(){ return 'sue_' + logicalToday().replace(/-/g,''); }
function next4am(){ const t = new Date(); t.setDate(t.getDate()+1); t.setHours(4,0,0,0); return t; }
const FAR = new Date('2099-01-01');

let state   = readCookie(dailyKey()) || {};
let history = readCookie('sue_history') || {};

function saveDaily(){ writeCookie(dailyKey(), state, next4am()); }
function saveHistory(){
  const done = ALL_IDS.filter(id => state[id]).length;
  history[logicalToday()] = { done, total: TOTAL };
  writeCookie('sue_history', history, FAR);
}

function updateProgress(){
  const panel = document.getElementById('exercises');
  const done  = ALL_IDS.filter(id => state[id]).length;
  const pct   = TOTAL ? Math.round((done / TOTAL) * 100) : 0;
  const fill  = panel.querySelector('.progress-fill');
  const count = panel.querySelector('.progress-count');
  const label = panel.querySelector('.progress-label');
  if(fill)  fill.style.width = pct + '%';
  if(count) count.textContent = done + '/' + TOTAL;
  if(label) label.textContent = pct === 100 ? 'All done!' : "Today's progress";
  saveHistory();
  if(document.getElementById('history').classList.contains('active')) renderHistory();
}

function toggle(id){
  state[id] = !state[id];
  saveDaily();
  const el = document.querySelector('[data-id="' + id + '"]');
  if(el) el.classList.toggle('done', !!state[id]);
  updateProgress();
}

function checkSvg(){
  return '<svg class="check-icon" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function buildPanel(){
  const panel = document.getElementById('exercises');
  const pw = document.createElement('div');
  pw.className = 'progress-bar-wrap';
  pw.innerHTML = '<span class="progress-label">Today\'s progress</span><div class="progress-track"><div class="progress-fill" style="width:0%"></div></div><span class="progress-count">0/' + TOTAL + '</span>';
  panel.appendChild(pw);

  ITEMS.exercises.forEach(function(group){
    const sec = document.createElement('div'); sec.className = 'section';
    const hdr = document.createElement('div'); hdr.className = 'section-header';
    hdr.innerHTML = '<div class="section-dot" style="background:' + group.dot + '"></div><span class="section-label">' + group.section + '</span><div class="section-line"></div>';
    sec.appendChild(hdr);

    group.items.forEach(function(item){
      const div = document.createElement('div');
      div.className = 'item' + (state[item.id] ? ' done' : '');
      div.setAttribute('data-id', item.id);
      div.onclick = function(){ toggle(item.id); };
      div.innerHTML = '<div class="checkbox">' + checkSvg() + '</div><div class="item-body"><div class="item-top"><span class="item-name">' + item.name + '</span><span class="badge badge-' + item.cat + '">' + item.catLabel + '</span></div><div class="item-summary">' + item.summary + '</div>' + (item.meta ? '<div class="item-meta">' + item.meta + '</div>' : '') + '</div>';
      sec.appendChild(div);
    });
    panel.appendChild(sec);
  });

  const btn = document.createElement('button');
  btn.className = 'reset-btn';
  btn.textContent = 'Clear all checks';
  btn.onclick = function(){
    ALL_IDS.forEach(function(id){ state[id] = false; });
    saveDaily();
    panel.querySelectorAll('.item').forEach(function(el){ el.classList.remove('done'); });
    updateProgress();
  };
  panel.appendChild(btn);
}

function pctColor(pct){
  if(pct === 0) return '#e8e4dc';
  if(pct < 33)  return '#f5c8a0';
  if(pct < 66)  return '#a8c8e0';
  return '#3d5a8a';
}
function drawPieSvg(pct, size){
  const r=14, cx=16, cy=16, circ=2*Math.PI*r, filled=(pct/100)*circ, fg=pctColor(pct);
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 32 32" style="display:block"><circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="#e8e4dc"/><circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + fg + '" stroke-width="32" stroke-dasharray="' + filled + ' ' + (circ-filled) + '" style="transform:rotate(-90deg);transform-origin:' + cx + 'px ' + cy + 'px"/></svg>';
}
function calcStreak(){
  let streak = 0;
  const cursor = new Date(logicalToday() + 'T12:00:00');
  for(let i = 0; i < 365; i++){
    const k = cursor.getFullYear() + '-' + String(cursor.getMonth()+1).padStart(2,'0') + '-' + String(cursor.getDate()).padStart(2,'0');
    if(history[k] && history[k].done > 0){ streak++; cursor.setDate(cursor.getDate()-1); } else break;
  }
  return streak;
}

function renderHistory(){
  const panel = document.getElementById('history');
  panel.innerHTML = '';
  const today  = logicalToday();
  const todayD = new Date(today + 'T12:00:00');

  const calWrap = document.createElement('div'); calWrap.className = 'cal-wrap';
  calWrap.innerHTML = '<div class="cal-header"><span class="cal-title">35-day history</span><div class="cal-legend"><div class="cal-legend-item"><div class="cal-dot" style="background:#e8e4dc;border:1px solid #ccc6b8"></div>No data</div><div class="cal-legend-item"><div class="cal-dot" style="background:#f5c8a0"></div>&lt;33%</div><div class="cal-legend-item"><div class="cal-dot" style="background:#a8c8e0"></div>33\u201365%</div><div class="cal-legend-item"><div class="cal-dot" style="background:#3d5a8a"></div>66%+</div></div></div>';

  const grid = document.createElement('div'); grid.className = 'cal-grid';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(function(d){
    const l = document.createElement('div'); l.className = 'cal-day-label'; l.textContent = d; grid.appendChild(l);
  });
  const startD = new Date(todayD); startD.setDate(todayD.getDate() - todayD.getDay() - 28);
  for(let i = 0; i < 35; i++){
    const d = new Date(startD); d.setDate(startD.getDate() + i);
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const rec = history[k], isToday = k === today, isFuture = d > todayD;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (isToday ? ' today' : '');
    if(isFuture){
      cell.innerHTML = '<div class="cal-cell-inner" style="border-color:transparent;background:transparent"></div>';
    } else if(rec){
      const pct = Math.round((rec.done / rec.total) * 100), col = pctColor(pct);
      cell.classList.add('has-data');
      cell.innerHTML = '<div class="cal-cell-inner" style="background:' + col + ';border-color:' + col + ';padding:0">' + drawPieSvg(pct,'100%') + '</div><div class="cal-tooltip">' + d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' \u00b7 ' + rec.done + '/' + rec.total + ' (' + pct + '%)</div>';
    } else {
      cell.innerHTML = '<div class="cal-cell-inner" style="font-size:0.58rem;color:#c0bbb4">' + d.getDate() + '</div>';
    }
    grid.appendChild(cell);
  }
  calWrap.appendChild(grid);
  panel.appendChild(calWrap);

  const keys = Object.keys(history).sort();
  if(!keys.length){
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;color:var(--muted);font-size:0.85rem;padding:2rem 0';
    empty.textContent = 'No history yet \u2014 start checking off items to build your record.';
    panel.appendChild(empty); return;
  }

  const pcts   = keys.map(function(k){ return Math.round((history[k].done / history[k].total) * 100); });
  const avgPct = Math.round(pcts.reduce(function(a,b){ return a+b; }, 0) / pcts.length);
  const statsWrap = document.createElement('div');
  statsWrap.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem';
  [
    { label:'Avg',        value: avgPct + '%' },
    { label:'Best day',   value: Math.max.apply(null,pcts) + '%' },
    { label:'Streak',     value: calcStreak() + ' days' },
    { label:'Days logged', value: keys.length }
  ].forEach(function(s){
    const c = document.createElement('div');
    c.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.75rem 0.5rem;text-align:center';
    c.innerHTML = '<div style="font-size:0.6rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem">' + s.label + '</div><div style="font-size:1.25rem;font-weight:500;color:var(--accent)">' + s.value + '</div>';
    statsWrap.appendChild(c);
  });
  panel.appendChild(statsWrap);

  const logTitle = document.createElement('div');
  logTitle.style.cssText = 'font-size:0.68rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.6rem';
  logTitle.textContent = 'Recent days';
  panel.appendChild(logTitle);

  keys.slice().reverse().slice(0,14).forEach(function(k){
    const rec = history[k], pct = Math.round((rec.done / rec.total) * 100), col = pctColor(pct);
    const date = new Date(k + 'T12:00:00'), isHistToday = k === today;
    const label = date.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:0.75rem;padding:0.55rem 0.875rem;background:' + (isHistToday ? '#eef3f9' : 'var(--surface)') + ';border:1px solid ' + (isHistToday ? '#7fa0c8' : 'var(--border)') + ';' + (isHistToday ? 'border-left:3px solid #3d5a8a;' : '') + 'border-radius:8px;margin-bottom:0.4rem';
    row.innerHTML = '<div style="flex-shrink:0">' + drawPieSvg(pct,24) + '</div><span style="font-size:0.8rem;color:var(--text);flex:1">' + label + (isHistToday ? ' <span style="font-size:0.65rem;color:var(--accent)">today</span>' : '') + '</span><span style="font-size:0.78rem;color:var(--muted)">' + rec.done + '/' + rec.total + '</span><span style="font-size:0.8rem;font-weight:500;color:' + (pct>=66?'var(--accent)':pct>=33?'#7a6a40':'#8a4a30') + ';min-width:32px;text-align:right">' + pct + '%</span><div style="width:60px;height:4px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0"><div style="height:100%;width:' + pct + '%;background:' + col + ';border-radius:4px"></div></div>';
    panel.appendChild(row);
  });
}

function switchTab(tabId, el){
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById(tabId).classList.add('active');
  el.classList.add('active');
  if(tabId === 'history') renderHistory();
}

document.getElementById('dateBar').textContent =
  new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
buildPanel();
updateProgress();
</script>
</body>
</html>
