<!DOCTYPE html>
<!--
  MODERN TASK MANAGER

  A secure, performant personal task management application

  Features:
  - IndexedDB for persistent local storage
  - Local import/export functionality
  - Comprehensive XSS protection
  - Modern ES6+ JavaScript
  - No inline event handlers
  - Content Security Policy

  Security:
  - All user input sanitized and escaped
  - URL validation to prevent malicious links
  - CSP headers restrict script execution
  - Import/export data validation
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">
<link rel="apple-touch-icon" href="/dailies/checks.png">
<link rel="icon" type="image/png" href="/dailies/checks.png">
<title>Task Manager</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: #f9f8f6;
  color: #1a1714;
  padding: max(env(safe-area-inset-top), 16px) env(safe-area-inset-right, 16px) max(env(safe-area-inset-bottom), 16px) env(safe-area-inset-left, 16px);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding-bottom: 0;
  transition: padding-bottom 0.2s;
}

.container.has-undo {
  padding-bottom: 60px;
}

@media (max-width: 480px) {
  body {
    padding: 12px;
    font-size: 16px; /* Prevents iOS zoom on input focus */
  }

  .container.has-undo {
    padding-bottom: 80px;
  }
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}

.header h1 {
  font-size: 24px;
  font-weight: 600;
  flex: 1;
  min-width: 100px;
}

.header-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}

@media (max-width: 480px) {
  .header {
    gap: 10px;
    margin-bottom: 1rem;
  }

  .header h1 {
    font-size: 26px;
    width: 100%;
    margin-bottom: 8px;
  }

  .header-actions {
    width: 100%;
    justify-content: space-between;
  }
}

.btn {
  font-size: 13px;
  padding: 8px 14px;
  cursor: pointer;
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  color: #1a1714;
  transition: all 0.2s;
  min-height: 36px;
  white-space: nowrap;
}

.btn:hover {
  border-color: #888;
  background: #fafafa;
}

.btn:active {
  transform: scale(0.98);
}

.btn-icon {
  font-size: 18px;
  cursor: pointer;
  padding: 6px 10px;
  background: none;
  border: none;
  min-height: 36px;
  min-width: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-icon:hover {
  opacity: 0.7;
}

.btn-icon:active {
  transform: scale(0.95);
}

@media (max-width: 480px) {
  .btn {
    font-size: 13px;
    padding: 10px 12px;
    min-height: 44px; /* iOS recommended touch target */
    border-radius: 10px;
  }

  .btn-icon {
    font-size: 20px;
    padding: 8px 10px;
    min-height: 44px;
    min-width: 44px;
  }
}

.status {
  font-size: 12px;
  color: #888;
}

.status.success {
  color: #3b6d11;
}

@media (max-width: 480px) {
  .status {
    font-size: 11px;
    width: 100%;
    text-align: center;
    order: 999;
    margin-top: 4px;
  }
}

/* Add Task Form */
.add-form {
  background: #f0ede8;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 1rem;
  display: none;
}

.add-form.visible {
  display: block;
}

.form-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.form-row:last-child {
  margin-bottom: 0;
}

.form-row input[type="text"],
.form-row input[type="date"],
.form-row select {
  font-size: 16px; /* Prevents iOS zoom */
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: white;
  font-family: inherit;
}

.form-row input[type="text"] {
  flex: 1;
  min-width: 180px;
}

.form-row select {
  width: 110px;
}

.form-row input[type="date"] {
  width: 150px;
}

.form-row label {
  font-size: 13px;
  color: #666;
  display: flex;
  align-items: center;
  gap: 6px;
}

@media (max-width: 480px) {
  .add-form {
    padding: 16px;
    border-radius: 14px;
  }

  .form-row {
    gap: 8px;
    margin-bottom: 10px;
  }

  .form-row input[type="text"],
  .form-row input[type="date"],
  .form-row select {
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 16px;
    min-height: 44px;
  }

  .form-row input[type="text"] {
    width: 100%;
    min-width: unset;
  }

  .form-row select {
    flex: 1;
    min-width: 90px;
  }

  .form-row input[type="date"] {
    flex: 1;
    min-width: 140px;
  }

  .form-row label {
    font-size: 14px;
    width: 100%;
  }

  .form-row label input[type="date"] {
    flex: 1;
  }

  .form-row .btn {
    flex: 1;
    min-width: 80px;
  }
}

/* Filters */
.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}

.filter-btn {
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #ddd;
  background: transparent;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  min-height: 32px;
}

.filter-btn:hover {
  border-color: #bbb;
}

.filter-btn:active {
  transform: scale(0.96);
}

.filter-btn.active {
  background: #1a1714;
  border-color: #1a1714;
  color: white;
  font-weight: 500;
}

.filter-btn.immediate {
  border-color: #e24b4a;
  color: #a32d2d;
}

.filter-btn.immediate.active {
  background: #a32d2d;
  border-color: #a32d2d;
  color: white;
}

@media (max-width: 480px) {
  .filters {
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    margin-bottom: 1rem;
    padding-bottom: 4px;
    gap: 8px;
  }

  .filters::-webkit-scrollbar {
    display: none;
  }

  .filter-btn {
    font-size: 14px;
    padding: 8px 16px;
    min-height: 36px;
    border-radius: 24px;
  }
}

/* Tasks */
.task-group-label {
  font-size: 11px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 10px 0 8px;
  border-bottom: 1px solid #e0ddd8;
  margin-bottom: 8px;
  margin-top: 18px;
}

.task-group-label:first-of-type {
  margin-top: 0;
}

.task-group-label.immediate {
  color: #a32d2d;
  border-bottom-color: #f09595;
  font-weight: 600;
}

.task {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #e0ddd8;
  background: white;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.task:hover {
  border-color: #bbb;
}

.task:active {
  transform: scale(0.99);
}

.task.done {
  opacity: 0.5;
}

.task.immediate {
  border-left: 4px solid #e24b4a;
}

.task.editing {
  border-color: #888;
  background: #fafafa;
}

.task.undo-highlight {
  animation: undoFlash 0.6s ease;
}

@keyframes undoFlash {
  0% { background: #fff9e6; }
  100% { background: white; }
}

.task-checkbox {
  width: 20px;
  height: 20px;
  margin-top: 2px;
  flex-shrink: 0;
  cursor: pointer;
  accent-color: #3b6d11;
}

@media (max-width: 480px) {
  .task-group-label {
    font-size: 12px;
    padding: 12px 0 10px;
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .task {
    padding: 14px 16px;
    gap: 14px;
    margin-bottom: 10px;
    border-radius: 12px;
  }

  .task-checkbox {
    width: 24px;
    height: 24px;
    margin-top: 1px;
  }
}

.task-body {
  flex: 1;
  min-width: 0;
}

.task-title {
  font-size: 15px;
  line-height: 1.4;
  word-break: break-word;
}

.task.done .task-title {
  text-decoration: line-through;
  color: #aaa;
}

.task-link {
  font-size: 12px;
  color: #3b6d11;
  margin-left: 4px;
  text-decoration: none;
  white-space: nowrap;
}

.task-meta {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 6px;
  flex-wrap: wrap;
}

.badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 12px;
  font-weight: 500;
}

@media (max-width: 480px) {
  .task-title {
    font-size: 16px;
    line-height: 1.5;
  }

  .task-link {
    font-size: 13px;
    margin-left: 6px;
  }

  .task-meta {
    margin-top: 8px;
    gap: 8px;
  }

  .badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 14px;
  }
}

.badge.high {
  background: #FCEBEB;
  color: #A32D2D;
}

.badge.med {
  background: #FAEEDA;
  color: #854F0B;
}

.badge.low {
  background: #EAF3DE;
  color: #3B6D11;
}

.badge.due {
  background: #f0ede8;
  color: #888;
  border: 1px solid #ddd;
}

.badge.due-soon {
  background: #FAEEDA;
  color: #854F0B;
}

.badge.overdue {
  background: #FCEBEB;
  color: #A32D2D;
}

.task-actions {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.2s;
}

.task:hover .task-actions,
.task.editing .task-actions {
  opacity: 1;
}

.action-btn {
  font-size: 13px;
  color: #888;
  background: none;
  border: 1px solid transparent;
  border-radius: 6px;
  cursor: pointer;
  padding: 4px 10px;
  transition: all 0.2s;
  white-space: nowrap;
}

.action-btn:hover {
  border-color: #ccc;
  color: #333;
  background: #f5f5f5;
}

.action-btn:active {
  transform: scale(0.95);
}

.action-btn.delete:hover {
  color: #a32d2d;
  border-color: #f09595;
}

.action-btn.save {
  color: #3b6d11;
}

.action-btn.save:hover {
  border-color: #b8d4b8;
  background: #eaf3de;
}

@media (max-width: 480px) {
  .task-actions {
    opacity: 1; /* Always show on mobile */
    gap: 6px;
  }

  .action-btn {
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 8px;
    min-height: 36px;
    border: 1px solid #ddd;
    background: white;
  }

  .action-btn.save {
    background: #eaf3de;
    border-color: #b8d4b8;
  }

  .action-btn.delete {
    color: #a32d2d;
  }
}

/* Edit Mode */
.edit-fields {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.edit-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.edit-row input[type="text"],
.edit-row input[type="date"],
.edit-row select {
  font-size: 14px;
  padding: 6px 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-family: inherit;
}

.edit-row input[type="text"] {
  flex: 1;
  min-width: 140px;
}

.edit-row label {
  font-size: 13px;
  color: #888;
  white-space: nowrap;
}

@media (max-width: 480px) {
  .edit-fields {
    margin-top: 10px;
    gap: 10px;
  }

  .edit-row {
    gap: 8px;
  }

  .edit-row input[type="text"],
  .edit-row input[type="date"],
  .edit-row select {
    font-size: 16px;
    padding: 10px 12px;
    border-radius: 8px;
    min-height: 44px;
  }

  .edit-row input[type="text"] {
    width: 100%;
    min-width: unset;
  }

  .edit-row select {
    flex: 1;
    min-width: 90px;
  }

  .edit-row label {
    font-size: 14px;
    width: 100%;
  }

  .edit-row label input[type="date"] {
    flex: 1;
  }
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid #e0ddd8;
}

.stat-card {
  background: #f0ede8;
  border-radius: 10px;
  padding: 12px 16px;
}

.stat-label {
  font-size: 12px;
  color: #888;
  margin-bottom: 4px;
  line-height: 1.3;
}

.stat-value {
  font-size: 26px;
  font-weight: 600;
}

@media (max-width: 480px) {
  .stats {
    gap: 10px;
    margin-top: 2rem;
    padding-top: 1.5rem;
  }

  .stat-card {
    padding: 14px 16px;
    border-radius: 12px;
  }

  .stat-label {
    font-size: 13px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 600;
  }
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 3rem 2rem;
  color: #aaa;
  font-size: 15px;
}

@media (max-width: 480px) {
  .empty-state {
    padding: 4rem 2rem;
    font-size: 16px;
  }
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.visible {
  display: flex;
}

.modal-content {
  background: white;
  border-radius: 14px;
  padding: 24px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  max-height: 85vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.modal-header {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 18px;
}

.modal-body {
  margin-bottom: 24px;
}

.modal-body label {
  display: block;
  font-size: 14px;
  color: #666;
  margin-bottom: 8px;
  font-weight: 500;
}

.modal-body input[type="text"] {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  font-family: monospace;
}

.modal-hint {
  font-size: 13px;
  color: #888;
  margin-top: 10px;
  line-height: 1.6;
}

.modal-hint a {
  color: #3b6d11;
}

.modal-hint ol {
  margin: 10px 0;
  padding-left: 24px;
}

.modal-hint ol li {
  margin-bottom: 6px;
}

.modal-footer {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.modal-btn {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  border: 1px solid #ddd;
  background: white;
  transition: all 0.2s;
  min-height: 40px;
}

.modal-btn:hover {
  opacity: 0.9;
}

.modal-btn:active {
  transform: scale(0.98);
}

.modal-btn.primary {
  background: #1a1714;
  color: white;
  border-color: #1a1714;
}

@media (max-width: 480px) {
  .modal {
    padding: 16px;
    align-items: flex-end;
  }

  .modal-content {
    border-radius: 16px 16px 0 0;
    padding: 24px 20px;
    max-height: 90vh;
    width: 100%;
  }

  .modal-header {
    font-size: 22px;
    margin-bottom: 20px;
  }

  .modal-body label {
    font-size: 15px;
    margin-bottom: 10px;
  }

  .modal-body input[type="text"] {
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 16px;
    min-height: 44px;
  }

  .modal-hint {
    font-size: 14px;
    margin-top: 12px;
  }

  .modal-footer {
    gap: 10px;
    flex-direction: column-reverse;
  }

  .modal-btn {
    width: 100%;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 16px;
    min-height: 48px;
  }
}

/* Hidden */
.hidden {
  display: none;
}

/* Undo Bar */
.undo-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #1a1714;
  color: white;
  padding: 10px 16px;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.2);
  z-index: 900;
  font-size: 13px;
  border-top: 1px solid #333;
}

.undo-bar.visible {
  display: flex;
}

.undo-bar-text {
  flex: 0;
  color: #aaa;
}

.undo-bar-action {
  color: white;
  font-weight: 500;
}

.undo-bar-btn {
  background: white;
  color: #1a1714;
  border: none;
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.undo-bar-btn:hover {
  background: #f0f0f0;
}

.undo-bar-btn:active {
  transform: scale(0.98);
}

.undo-bar-count {
  color: #888;
  font-size: 12px;
  margin-left: 8px;
}

@media (max-width: 480px) {
  .undo-bar {
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    font-size: 14px;
  }

  .undo-bar-btn {
    padding: 8px 18px;
    font-size: 14px;
    min-height: 40px;
  }
}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <h1>Tasks</h1>
    <div class="header-actions">
      <button class="btn" id="add-btn">+ Add</button>
      <button class="btn" id="export-btn">Export</button>
      <button class="btn" id="import-btn">Import</button>
      <input type="file" id="import-file" accept=".json" class="hidden">
      <span class="status" id="status">loading...</span>
    </div>
  </header>

  <div class="add-form" id="add-form">
    <div class="form-row">
      <input type="text" id="task-title" placeholder="Add a task...">
      <select id="task-priority">
        <option value="high">High</option>
        <option value="med" selected>Medium</option>
        <option value="low">Low</option>
      </select>
      <input type="text" id="task-category" list="category-list" placeholder="Category" style="width:130px" autocomplete="off">
      <datalist id="category-list"></datalist>
      <button class="btn" id="save-task-btn">Save</button>
      <button class="btn" id="cancel-task-btn" style="background: #f0ede8;">Cancel</button>
    </div>
    <div class="form-row">
      <label>Complete by: <input type="date" id="task-due"></label>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div id="task-list"></div>
  <div class="stats" id="stats"></div>
</div>

<div class="undo-bar" id="undo-bar">
  <span class="undo-bar-text">Undo last:</span>
  <span class="undo-bar-action" id="undo-action">Task completed</span>
  <button class="undo-bar-btn" id="undo-btn">Undo</button>
  <span class="undo-bar-count" id="undo-count"></span>
</div>

<script>
'use strict';

// ============================================================================
// Constants & Configuration
// ============================================================================

const CONFIG = {
  STORAGE: {
    ACTIVE_KEY: 'tasks_active_v5',
    DONE_KEY: 'tasks_done_v5',
    DB_NAME: 'TasksDB',
    DB_VERSION: 1,
    STORE_NAME: 'tasks'
  },
  LIMITS: {
    MAX_TITLE_LENGTH: 500,
    MAX_CATEGORY_LENGTH: 100,
    MAX_URL_LENGTH: 2000,
    MAX_FILE_SIZE: 10 * 1024 * 1024 // 10MB
  },
  CATEGORIES: {
    IMMEDIATE: 'Immediate'
  },
  PRIORITIES: ['high', 'med', 'low']
};

// ============================================================================
// State Management
// ============================================================================

const state = {
  tasks: [],
  filter: 'all',
  editingId: null,
  db: null,
  undoStack: [] // Stack of undo operations (max 10)
};

// ============================================================================
// Security & Validation
// ============================================================================

const Security = {
  escapeHtml(str) {
    if (typeof str !== 'string') return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  },

  escapeAttr(str) {
    if (typeof str !== 'string') return '';
    return str.replace(/[&<>"']/g, char => {
      const entities = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      };
      return entities[char] || char;
    });
  },

  isSafeUrl(url) {
    if (!url || typeof url !== 'string') return false;
    const trimmed = url.trim().toLowerCase();
    const dangerousProtocols = ['javascript:', 'data:', 'vbscript:', 'file:', 'about:'];

    for (const protocol of dangerousProtocols) {
      if (trimmed.startsWith(protocol)) return false;
    }

    return trimmed.startsWith('http://') ||
           trimmed.startsWith('https://') ||
           trimmed.startsWith('//') ||
           trimmed.startsWith('/');
  },

  validateDate(dateStr) {
    if (!dateStr || typeof dateStr !== 'string') return false;
    const regex = /^\d{4}-\d{2}-\d{2}$/;
    if (!regex.test(dateStr)) return false;
    const date = new Date(dateStr + 'T00:00:00');
    return date instanceof Date && !isNaN(date);
  },

  sanitizeTask(task) {
    if (!task || typeof task !== 'object') return null;

    return {
      id: String(task.id || Date.now()),
      title: String(task.title || '').substring(0, CONFIG.LIMITS.MAX_TITLE_LENGTH),
      priority: CONFIG.PRIORITIES.includes(task.priority) ? task.priority : 'med',
      category: String(task.category || '').substring(0, CONFIG.LIMITS.MAX_CATEGORY_LENGTH),
      done: Boolean(task.done),
      due: this.validateDate(task.due) ? task.due : '',
      url: this.isSafeUrl(task.url) ? String(task.url).substring(0, CONFIG.LIMITS.MAX_URL_LENGTH) : ''
    };
  },

  sanitizeTasks(tasksArray) {
    if (!Array.isArray(tasksArray)) return [];
    return tasksArray.map(t => this.sanitizeTask(t)).filter(t => t !== null);
  }
};

// ============================================================================
// Database Operations
// ============================================================================

const Database = {
  async init() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(CONFIG.STORAGE.DB_NAME, CONFIG.STORAGE.DB_VERSION);

      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        state.db = request.result;
        resolve(state.db);
      };

      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(CONFIG.STORAGE.STORE_NAME)) {
          db.createObjectStore(CONFIG.STORAGE.STORE_NAME);
        }
      };
    });
  },

  async save(key, value) {
    if (!state.db) throw new Error('Database not initialized');
    return new Promise((resolve, reject) => {
      const transaction = state.db.transaction([CONFIG.STORAGE.STORE_NAME], 'readwrite');
      const store = transaction.objectStore(CONFIG.STORAGE.STORE_NAME);
      const request = store.put(value, key);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  },

  async load(key) {
    if (!state.db) throw new Error('Database not initialized');
    return new Promise((resolve, reject) => {
      const transaction = state.db.transaction([CONFIG.STORAGE.STORE_NAME], 'readonly');
      const store = transaction.objectStore(CONFIG.STORAGE.STORE_NAME);
      const request = store.get(key);
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  },

  async delete(key) {
    if (!state.db) throw new Error('Database not initialized');
    return new Promise((resolve, reject) => {
      const transaction = state.db.transaction([CONFIG.STORAGE.STORE_NAME], 'readwrite');
      const store = transaction.objectStore(CONFIG.STORAGE.STORE_NAME);
      const request = store.delete(key);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }
};

// ============================================================================
// Cookie Backup (Fallback Storage)
// ============================================================================

const CookieStorage = {
  set(name, value, days = 365) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
  },

  get(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : null;
  }
};

// ============================================================================
// Task Operations
// ============================================================================

const TaskManager = {
  async load() {
    try {
      await Database.init();

      // Try IndexedDB first
      const activeData = await Database.load(CONFIG.STORAGE.ACTIVE_KEY);
      const doneData = await Database.load(CONFIG.STORAGE.DONE_KEY);

      if (activeData || doneData) {
        const activeTasks = activeData ? JSON.parse(activeData) : [];
        const doneTasks = doneData ? JSON.parse(doneData) : [];
        state.tasks = Security.sanitizeTasks([...activeTasks, ...doneTasks]);
      } else {
        // Fallback to cookies
        const cookieActive = CookieStorage.get(CONFIG.STORAGE.ACTIVE_KEY);
        const cookieDone = CookieStorage.get(CONFIG.STORAGE.DONE_KEY);

        if (cookieActive || cookieDone) {
          const activeTasks = cookieActive ? JSON.parse(cookieActive) : [];
          const doneTasks = cookieDone ? JSON.parse(cookieDone) : [];
          state.tasks = Security.sanitizeTasks([...activeTasks, ...doneTasks]);
        } else {
          state.tasks = [];
        }
      }

      await this.save(true);
    } catch (error) {
      console.error('Load error:', error);
      state.tasks = [];
    }

    UI.render();
  },

  async save(silent = false) {
    if (!silent) UI.setStatus('saving...', false);

    try {
      const activeTasks = state.tasks.filter(t => !t.done);
      const doneTasks = state.tasks.filter(t => t.done);

      // Save to IndexedDB
      await Database.save(CONFIG.STORAGE.ACTIVE_KEY, JSON.stringify(activeTasks));
      await Database.save(CONFIG.STORAGE.DONE_KEY, JSON.stringify(doneTasks));

      // Backup to cookies
      CookieStorage.set(CONFIG.STORAGE.ACTIVE_KEY, JSON.stringify(activeTasks));
      CookieStorage.set(CONFIG.STORAGE.DONE_KEY, JSON.stringify(doneTasks));

      UI.setStatus('saved', true);
    } catch (error) {
      console.error('Save error:', error);
      UI.setStatus('error', false);
    }
  },

  scheduleSave() {
    if (this.saveTimer) clearTimeout(this.saveTimer);
    this.saveTimer = setTimeout(() => this.save(false), 500);
  },

  add(taskData) {
    const newTask = Security.sanitizeTask(taskData);
    if (!newTask) {
      UI.setStatus('invalid task data', false);
      return false;
    }

    state.tasks.unshift(newTask);
    this.scheduleSave();
    return true;
  },

  update(id, updates) {
    const task = state.tasks.find(t => t.id === id);
    if (!task) return false;

    // Capture previous state
    const previousTask = { ...task };

    const sanitized = Security.sanitizeTask({ ...task, ...updates });
    if (!sanitized) {
      UI.setStatus('invalid task data', false);
      return false;
    }

    Object.assign(task, sanitized);
    this.scheduleSave();

    // Add to undo stack
    UndoManager.push('Task updated', {
      type: 'edit',
      data: { id, previousTask }
    });

    return true;
  },

  toggle(id) {
    const task = state.tasks.find(t => t.id === id);
    if (task) {
      const previousDone = task.done;
      task.done = !task.done;
      state.editingId = null;
      this.scheduleSave();
      UI.render();

      // Add to undo stack
      const message = task.done ? 'Task completed' : 'Task reopened';
      UndoManager.push(message, {
        type: 'toggle',
        data: { id, previousDone }
      });
    }
  },

  delete(id) {
    const index = state.tasks.findIndex(t => t.id === id);
    if (index === -1) return;

    const task = { ...state.tasks[index] };
    state.tasks = state.tasks.filter(t => t.id !== id);
    state.editingId = null;
    this.scheduleSave();
    UI.render();

    // Add to undo stack
    UndoManager.push('Task deleted', {
      type: 'delete',
      data: { task, index }
    });
  },

  getFiltered() {
    const { tasks, filter } = state;

    if (filter === 'done') {
      return tasks.filter(t => t.done);
    }

    if (filter === 'all') {
      return tasks.filter(t => !t.done);
    }

    if (filter === 'due-soon') {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return tasks.filter(t => {
        if (t.done || !t.due) return false;
        const dueDate = new Date(t.due + 'T00:00:00');
        const diff = Math.round((dueDate - today) / 86400000);
        return diff <= 7;
      });
    }

    // Priority or category filter
    if (CONFIG.PRIORITIES.includes(filter)) {
      return tasks.filter(t => t.priority === filter && !t.done);
    }

    return tasks.filter(t => t.category === filter && !t.done);
  },

  export() {
    const activeTasks = state.tasks.filter(t => !t.done);
    const doneTasks = state.tasks.filter(t => t.done);

    const data = {
      active: activeTasks,
      completed: doneTasks,
      exportDate: new Date().toISOString()
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tasks-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);

    UI.setStatus('exported', true);
    setTimeout(() => UI.setStatus('saved', true), 2000);
  },

  import(fileData) {
    try {
      const data = JSON.parse(fileData);

      let importedTasks = [];
      if (data.active || data.completed) {
        importedTasks = [...(data.active || []), ...(data.completed || [])];
      } else if (Array.isArray(data)) {
        importedTasks = data;
      } else {
        throw new Error('Invalid format');
      }

      const sanitized = Security.sanitizeTasks(importedTasks);
      if (sanitized.length === 0) {
        throw new Error('No valid tasks found');
      }

      state.tasks = sanitized;
      this.save(false);
      UI.render();
      UI.setStatus(`imported ${sanitized.length} tasks`, true);
      setTimeout(() => UI.setStatus('saved', true), 2000);
      return true;
    } catch (error) {
      console.error('Import error:', error);
      UI.setStatus('import failed - invalid data', false);
      setTimeout(() => UI.setStatus('saved', true), 3000);
      return false;
    }
  }
};

// ============================================================================
// Undo Manager
// ============================================================================

const UndoManager = {
  push(message, undoData) {
    // Add to undo stack
    state.undoStack.push({
      message: message,
      ...undoData
    });

    // Keep only last 10 operations
    if (state.undoStack.length > 10) {
      state.undoStack.shift();
    }

    // Update UI
    this.updateUI();
  },

  updateUI() {
    const bar = document.getElementById('undo-bar');
    const actionText = document.getElementById('undo-action');
    const countText = document.getElementById('undo-count');
    const container = document.querySelector('.container');

    if (state.undoStack.length === 0) {
      bar.classList.remove('visible');
      if (container) container.classList.remove('has-undo');
      return;
    }

    // Show the last action
    const lastAction = state.undoStack[state.undoStack.length - 1];
    actionText.textContent = lastAction.message;

    // Show count if more than 1
    if (state.undoStack.length > 1) {
      countText.textContent = `(${state.undoStack.length} available)`;
    } else {
      countText.textContent = '';
    }

    bar.classList.add('visible');
    if (container) container.classList.add('has-undo');
  },

  undo() {
    if (state.undoStack.length === 0) {
      return;
    }

    // Pop the last operation from the stack
    const operation = state.undoStack.pop();

    const { type, data } = operation;
    let taskId = null;
    let success = false;

    if (type === 'toggle') {
      // Restore task completion state
      const task = state.tasks.find(t => t.id === data.id);
      if (task) {
        task.done = data.previousDone;
        taskId = data.id;
        success = true;
      }
    } else if (type === 'edit') {
      // Restore all previous task values
      const task = state.tasks.find(t => t.id === data.id);
      if (task) {
        Object.assign(task, data.previousTask);
        taskId = data.id;
        success = true;
      }
    } else if (type === 'delete') {
      // Restore deleted task at original position
      const insertIndex = Math.min(data.index, state.tasks.length);
      state.tasks.splice(insertIndex, 0, data.task);
      taskId = data.task.id;
      success = true;
    }

    if (success) {
      TaskManager.scheduleSave();
      UI.render();

      // Highlight the restored task
      if (taskId) {
        setTimeout(() => {
          const taskEl = document.querySelector(`[data-id="${taskId}"]`);
          if (taskEl) {
            taskEl.classList.add('undo-highlight');
            setTimeout(() => taskEl.classList.remove('undo-highlight'), 600);
          }
        }, 100);
      }
    }

    // Update UI to show next undo or hide bar
    this.updateUI();
  }
};

// ============================================================================
// UI Rendering & Interaction
// ============================================================================

const UI = {
  elements: {},

  init() {
    // Cache DOM elements
    this.elements = {
      addBtn: document.getElementById('add-btn'),
      exportBtn: document.getElementById('export-btn'),
      importBtn: document.getElementById('import-btn'),
      importFile: document.getElementById('import-file'),
      status: document.getElementById('status'),
      addForm: document.getElementById('add-form'),
      taskTitle: document.getElementById('task-title'),
      taskPriority: document.getElementById('task-priority'),
      taskCategory: document.getElementById('task-category'),
      taskDue: document.getElementById('task-due'),
      saveTaskBtn: document.getElementById('save-task-btn'),
      cancelTaskBtn: document.getElementById('cancel-task-btn'),
      categoryList: document.getElementById('category-list'),
      filters: document.getElementById('filters'),
      taskList: document.getElementById('task-list'),
      stats: document.getElementById('stats'),
      undoBar: document.getElementById('undo-bar'),
      undoBtn: document.getElementById('undo-btn'),
      undoAction: document.getElementById('undo-action'),
      undoCount: document.getElementById('undo-count')
    };

    this.attachEventListeners();
  },

  attachEventListeners() {
    // Header actions
    this.elements.addBtn.addEventListener('click', () => this.toggleAddForm());
    this.elements.exportBtn.addEventListener('click', () => TaskManager.export());
    this.elements.importBtn.addEventListener('click', () => this.elements.importFile.click());

    // Import file
    this.elements.importFile.addEventListener('change', (e) => this.handleImport(e));

    // Add form
    this.elements.saveTaskBtn.addEventListener('click', () => this.handleAddTask());
    this.elements.cancelTaskBtn.addEventListener('click', () => this.toggleAddForm());
    this.elements.taskTitle.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') this.handleAddTask();
    });
    this.elements.taskCategory.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') this.handleAddTask();
    });

    // Undo
    this.elements.undoBtn.addEventListener('click', () => {
      UndoManager.undo();
    });

    // Task list (delegated events)
    this.elements.taskList.addEventListener('click', (e) => this.handleTaskClick(e));
    this.elements.taskList.addEventListener('dblclick', (e) => this.handleTaskDblClick(e));
    this.elements.taskList.addEventListener('change', (e) => this.handleTaskChange(e));
    this.elements.taskList.addEventListener('keydown', (e) => this.handleTaskKeydown(e));
  },

  toggleAddForm() {
    const isVisible = this.elements.addForm.classList.contains('visible');

    if (isVisible) {
      this.elements.addForm.classList.remove('visible');
    } else {
      this.elements.addForm.classList.add('visible');
      this.elements.taskTitle.focus();
    }
  },

  handleAddTask() {
    const title = this.elements.taskTitle.value.trim();
    if (!title) return;

    const success = TaskManager.add({
      id: Date.now() + '',
      title: title,
      priority: this.elements.taskPriority.value,
      category: this.elements.taskCategory.value.trim(),
      done: false,
      due: this.elements.taskDue.value || ''
    });

    if (success) {
      this.elements.taskTitle.value = '';
      this.elements.taskCategory.value = '';
      this.elements.taskDue.value = '';
      this.elements.taskPriority.value = 'med';
      this.toggleAddForm();
      this.render();
    }
  },

  handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (file.size > CONFIG.LIMITS.MAX_FILE_SIZE) {
      this.setStatus('file too large', false);
      setTimeout(() => this.setStatus('saved', true), 2000);
      event.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      TaskManager.import(e.target.result);
    };
    reader.readAsText(file);
    event.target.value = '';
  },

  handleTaskClick(e) {
    const target = e.target;

    // Action buttons
    if (target.classList.contains('action-btn')) {
      e.stopPropagation();
      const taskEl = target.closest('.task');
      if (!taskEl) return;

      const taskId = taskEl.dataset.id;

      if (target.classList.contains('edit')) {
        this.startEdit(taskId);
      } else if (target.classList.contains('save')) {
        this.saveEdit(taskId);
      } else if (target.classList.contains('cancel-edit')) {
        state.editingId = null;
        this.render();
      } else if (target.classList.contains('delete')) {
        TaskManager.delete(taskId);
      }
    }
  },

  handleTaskDblClick(e) {
    if (e.target.closest('.task-actions') || e.target.closest('.edit-fields')) return;

    const taskEl = e.target.closest('.task');
    if (taskEl && !taskEl.classList.contains('editing')) {
      this.startEdit(taskEl.dataset.id);
    }
  },

  handleTaskChange(e) {
    if (e.target.classList.contains('task-checkbox')) {
      const taskEl = e.target.closest('.task');
      if (taskEl) {
        TaskManager.toggle(taskEl.dataset.id);
      }
    }
  },

  handleTaskKeydown(e) {
    if (e.target.closest('.edit-fields')) {
      const taskEl = e.target.closest('.task');
      if (!taskEl) return;

      const taskId = taskEl.dataset.id;

      if (e.key === 'Enter') {
        this.saveEdit(taskId);
      } else if (e.key === 'Escape') {
        state.editingId = null;
        this.render();
      }
    }
  },

  startEdit(taskId) {
    state.editingId = state.editingId === taskId ? null : taskId;
    this.render();
  },

  saveEdit(taskId) {
    const taskEl = document.querySelector(`[data-id="${taskId}"]`);
    if (!taskEl) return;

    const titleInput = taskEl.querySelector('.edit-title');
    const prioritySelect = taskEl.querySelector('.edit-priority');
    const categoryInput = taskEl.querySelector('.edit-category');
    const dueInput = taskEl.querySelector('.edit-due');

    const success = TaskManager.update(taskId, {
      title: titleInput ? titleInput.value.trim() : '',
      priority: prioritySelect ? prioritySelect.value : 'med',
      category: categoryInput ? categoryInput.value.trim() : '',
      due: dueInput ? dueInput.value : ''
    });

    if (success) {
      state.editingId = null;
      this.render();
    }
  },

  setFilter(filterValue) {
    state.filter = filterValue;
    this.render();
  },

  setStatus(text, isSuccess) {
    this.elements.status.textContent = text;
    this.elements.status.classList.toggle('success', isSuccess);
  },

  getDueMeta(due, done) {
    if (!due) return null;

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dueDate = new Date(due + 'T00:00:00');
    const diff = Math.round((dueDate - today) / 86400000);

    const formatDate = (iso) => {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    };

    if (done) return { label: 'due ' + formatDate(due), cls: '' };
    if (diff < 0) return { label: 'overdue', cls: 'overdue' };
    if (diff === 0) return { label: 'due today', cls: 'due-soon' };
    if (diff <= 7) return { label: 'due ' + formatDate(due), cls: 'due-soon' };
    return { label: 'due ' + formatDate(due), cls: '' };
  },

  render() {
    this.renderStats();
    this.renderFilters();
    this.renderTasks();
  },

  renderStats() {
    const active = state.tasks.filter(t => !t.done);
    const high = active.filter(t => t.priority === 'high').length;

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const soon = active.filter(t => {
      if (!t.due) return false;
      const dueDate = new Date(t.due + 'T00:00:00');
      return Math.round((dueDate - today) / 86400000) <= 7;
    }).length;

    this.elements.stats.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Active</div>
        <div class="stat-value">${active.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">High priority</div>
        <div class="stat-value">${high}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Due this week</div>
        <div class="stat-value">${soon}</div>
      </div>
    `;
  },

  renderFilters() {
    const categories = [...new Set(state.tasks.map(t => t.category).filter(Boolean))];
    const otherCategories = categories.filter(c => c !== CONFIG.CATEGORIES.IMMEDIATE);

    // Update category datalist
    this.elements.categoryList.innerHTML = categories
      .map(c => `<option value="${Security.escapeAttr(c)}">`)
      .join('');

    const filters = [
      { key: 'all', label: 'All active', isImmediate: false },
      { key: 'high', label: 'High', isImmediate: false },
      { key: 'med', label: 'Medium', isImmediate: false },
      { key: 'low', label: 'Low', isImmediate: false },
      { key: 'due-soon', label: 'Due soon', isImmediate: false },
      { key: CONFIG.CATEGORIES.IMMEDIATE, label: 'Immediate', isImmediate: true },
      ...otherCategories.map(c => ({ key: c, label: c, isImmediate: false })),
      { key: 'done', label: 'Done', isImmediate: false }
    ];

    this.elements.filters.innerHTML = filters
      .map(f => {
        const activeClass = state.filter === f.key ? ' active' : '';
        const immediateClass = f.isImmediate ? ' immediate' : '';
        return `<button class="filter-btn${activeClass}${immediateClass}" data-filter="${Security.escapeAttr(f.key)}">${Security.escapeHtml(f.label)}</button>`;
      })
      .join('');

    // Attach filter click handlers
    this.elements.filters.addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        this.setFilter(e.target.dataset.filter);
      }
    });
  },

  renderTasks() {
    const filtered = TaskManager.getFiltered();

    if (filtered.length === 0) {
      this.elements.taskList.innerHTML = '<div class="empty-state">Nothing here.</div>';
      return;
    }

    // Sort tasks
    const priorityOrder = { high: 0, med: 1, low: 2 };
    const sorted = [...filtered].sort((a, b) => {
      // Immediate category first
      if (a.category === CONFIG.CATEGORIES.IMMEDIATE && b.category !== CONFIG.CATEGORIES.IMMEDIATE) return -1;
      if (b.category === CONFIG.CATEGORIES.IMMEDIATE && a.category !== CONFIG.CATEGORIES.IMMEDIATE) return 1;

      // Then by due date presence
      const aHasDue = a.due ? 1 : 0;
      const bHasDue = b.due ? 1 : 0;
      if (aHasDue !== bHasDue) return bHasDue - aHasDue;

      // Then by due date value
      if (a.due && b.due && a.due !== b.due) return a.due < b.due ? -1 : 1;

      // Then by priority
      return (priorityOrder[a.priority] || 1) - (priorityOrder[b.priority] || 1);
    });

    // Group by category
    const byCategory = {};
    sorted.forEach(task => {
      const cat = task.category || 'Uncategorized';
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(task);
    });

    const priorityLabels = { high: 'High', med: 'Medium', low: 'Low' };
    const categoryOrder = [CONFIG.CATEGORIES.IMMEDIATE, ...Object.keys(byCategory).filter(c => c !== CONFIG.CATEGORIES.IMMEDIATE)];

    let html = '';

    for (const category of categoryOrder) {
      if (!byCategory[category]) continue;

      const isImmediate = category === CONFIG.CATEGORIES.IMMEDIATE;
      html += `<div class="task-group-label${isImmediate ? ' immediate' : ''}">${Security.escapeHtml(category)}</div>`;

      byCategory[category].forEach(task => {
        const dueMeta = this.getDueMeta(task.due, task.done);
        const isEditing = state.editingId === task.id;
        const safeId = Security.escapeAttr(task.id);

        let taskClasses = 'task';
        if (task.done) taskClasses += ' done';
        if (isImmediate) taskClasses += ' immediate';
        if (isEditing) taskClasses += ' editing';

        html += `<div class="${taskClasses}" data-id="${safeId}">`;
        html += `<input type="checkbox" class="task-checkbox" ${task.done ? 'checked' : ''}>`;
        html += '<div class="task-body">';

        if (isEditing) {
          html += '<div class="edit-fields">';
          html += '<div class="edit-row">';
          html += `<input type="text" class="edit-title" value="${Security.escapeAttr(task.title)}">`;
          html += '</div>';
          html += '<div class="edit-row">';
          html += '<select class="edit-priority">';
          html += `<option value="high"${task.priority === 'high' ? ' selected' : ''}>High</option>`;
          html += `<option value="med"${task.priority === 'med' ? ' selected' : ''}>Medium</option>`;
          html += `<option value="low"${task.priority === 'low' ? ' selected' : ''}>Low</option>`;
          html += '</select>';
          html += `<input type="text" class="edit-category" list="category-list" value="${Security.escapeAttr(task.category || '')}" placeholder="Category" style="width:130px" autocomplete="off">`;
          html += `<label>Due: <input type="date" class="edit-due" value="${Security.escapeAttr(task.due || '')}"></label>`;
          html += '</div>';
          html += '</div>';
        } else {
          html += `<div class="task-title">${Security.escapeHtml(task.title)}`;
          if (task.url && Security.isSafeUrl(task.url)) {
            html += ` <a href="${Security.escapeAttr(task.url)}" target="_blank" rel="noopener noreferrer" class="task-link">↗ link</a>`;
          }
          html += '</div>';
          html += '<div class="task-meta">';
          html += `<span class="badge ${task.priority}">${priorityLabels[task.priority]}</span>`;
          if (dueMeta) {
            html += `<span class="badge due ${dueMeta.cls}">${Security.escapeHtml(dueMeta.label)}</span>`;
          }
          html += '</div>';
        }

        html += '</div>';
        html += '<div class="task-actions">';
        if (isEditing) {
          html += '<button class="action-btn save">Save</button>';
          html += '<button class="action-btn cancel-edit">Cancel</button>';
        } else {
          html += '<button class="action-btn edit">Edit</button>';
        }
        html += '<button class="action-btn delete">✕</button>';
        html += '</div>';
        html += '</div>';
      });
    }

    this.elements.taskList.innerHTML = html;

    // Focus on edit field if editing
    if (state.editingId) {
      const editField = this.elements.taskList.querySelector('.edit-title');
      if (editField) {
        editField.focus();
        editField.setSelectionRange(editField.value.length, editField.value.length);
      }
    }
  }
};

// ============================================================================
// Application Initialization
// ============================================================================

document.addEventListener('DOMContentLoaded', async () => {
  UI.init();
  await TaskManager.load();
});
</script>
</body>
</html>
